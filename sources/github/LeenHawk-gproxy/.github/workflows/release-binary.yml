name: build-binaries

on:
  push:
    branches:
      - main
      - master
      - dev
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GPROXY_UPDATE_CHANNEL: ${{ github.event_name == 'push' && 'staging' || 'stable' }}

jobs:
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build console
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @gproxy/console build

      # The console build emits to `frontend/console/dist` AND copies to
      # `apps/gproxy/web/console` via the `sync-to-embed.mjs` postbuild
      # step. The Rust binary embeds from the `web/console` path, so the
      # downstream `build` job downloads this artifact straight into that
      # location to short-circuit having to install pnpm everywhere.
      - name: Upload console embed
        uses: actions/upload-artifact@v7
        with:
          name: console-embed
          path: apps/gproxy/web/console
          retention-days: 1

  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }})
    needs: build-frontend
    runs-on: ${{ matrix.runner }}
    env:
      # Build-time env read by `option_env!("GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64")`
      # in crates/gproxy-api/src/admin/update.rs. Used to verify the
      # signed checksum manifests downloaded by the in-app updater.
      GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64: ${{ secrets.UPDATE_SIGNING_PUBLIC_KEY_B64 }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            arch: x86_64
            libc: gnu
            run_check: true
          - platform: linux
            runner: ubuntu-24.04-arm
            arch: aarch64
            libc: gnu
            run_check: true
          - platform: linux
            runner: ubuntu-latest
            arch: x86_64
            libc: musl
            cross: true
            run_check: true
          - platform: linux
            runner: ubuntu-latest
            arch: aarch64
            libc: musl
            cross: true
            run_check: false
          - platform: android
            runner: ubuntu-latest
            arch: x86_64
            android_abi: x86_64
            run_check: false
          - platform: android
            runner: ubuntu-latest
            arch: aarch64
            android_abi: arm64-v8a
            run_check: false
          - platform: windows
            runner: windows-latest
            arch: x86_64
            run_check: true
          - platform: windows
            runner: windows-latest
            arch: aarch64
            run_check: false
          - platform: macos
            runner: macos-latest
            arch: x86_64
            run_check: true
          - platform: macos
            runner: macos-latest
            arch: aarch64
            run_check: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download console embed
        uses: actions/download-artifact@v8
        with:
          name: console-embed
          path: apps/gproxy/web/console

      - name: Validate update signing build settings
        run: |
          set -euo pipefail
          test -n "${GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64}" || {
            echo "missing repo secret: GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64" >&2
            exit 1
          }

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }}-

      - name: Derive target metadata
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            linux)
              target="${{ matrix.arch }}-unknown-linux-${{ matrix.libc }}"
              artifact="gproxy-linux-${{ matrix.arch }}"
              if [ "${{ matrix.libc }}" = "musl" ]; then
                artifact="${artifact}-musl"
              fi
              artifact="${artifact}.zip"
              ext=""
              ;;
            android)
              target="${{ matrix.arch }}-linux-android"
              artifact="gproxy-android-${{ matrix.arch }}.zip"
              ext=""
              ;;
            windows)
              target="${{ matrix.arch }}-pc-windows-msvc"
              artifact="gproxy-windows-${{ matrix.arch }}.zip"
              ext=".exe"
              ;;
            macos)
              target="${{ matrix.arch }}-apple-darwin"
              artifact="gproxy-macos-${{ matrix.arch }}.zip"
              ext=""
              ;;
            *)
              echo "unknown platform: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac

          echo "TARGET=$target" >> "$GITHUB_ENV"
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"
          echo "BIN_EXT=$ext" >> "$GITHUB_ENV"

      - name: Install target
        run: rustup target add "$TARGET"

      - name: Install Android NDK
        if: ${{ matrix.platform == 'android' }}
        uses: android-actions/setup-android@v4

      - name: Install Android toolchain
        if: ${{ matrix.platform == 'android' }}
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          cargo install cargo-ndk --locked

      - name: Install cross
        if: ${{ matrix.cross }}
        run: |
          cargo install cross --locked
          echo "CROSS_TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "CROSS_NO_DEFAULT_TOOLCHAIN=1" >> "$GITHUB_ENV"

      - name: Build (unix)
        if: ${{ runner.os != 'Windows' }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "$TARGET" -p gproxy
          elif [ "${{ matrix.platform }}" = "android" ]; then
            cargo ndk -t ${{ matrix.android_abi }} build --release -p gproxy
          else
            cargo build --release --target "$TARGET" -p gproxy
          fi

      - name: Build (windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build --release --target "$env:TARGET" -p gproxy

      - name: Run --help check before UPX (unix)
        if: ${{ runner.os != 'Windows' && matrix.run_check }}
        run: |
          cd target/$TARGET/release
          ./gproxy --help

      - name: Run --help check before UPX (windows)
        if: ${{ runner.os == 'Windows' && matrix.run_check }}
        shell: pwsh
        run: |
          $bin = Join-Path -Path "target" -ChildPath "$env:TARGET/release/gproxy$env:BIN_EXT"
          & $bin --help

      - name: Install UPX (linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends upx-ucl zip

      - name: Install UPX (windows)
        if: ${{ runner.os == 'Windows' && matrix.arch != 'aarch64' }}
        shell: pwsh
        run: choco install upx -y

      - name: Compress binary (non-macos)
        if: ${{ runner.os != 'macOS' && !(matrix.platform == 'windows' && matrix.arch == 'aarch64') }}
        run: upx --best --lzma target/$TARGET/release/gproxy$BIN_EXT

      - name: Run --help check after UPX (unix)
        if: ${{ runner.os != 'Windows' && runner.os != 'macOS' && matrix.run_check }}
        run: |
          cd target/$TARGET/release
          ./gproxy --help

      - name: Run --help check after UPX (windows)
        if: ${{ runner.os == 'Windows' && matrix.run_check && matrix.arch != 'aarch64' }}
        shell: pwsh
        run: |
          $bin = Join-Path -Path "target" -ChildPath "$env:TARGET/release/gproxy$env:BIN_EXT"
          & $bin --help

      - name: Codesign (macos)
        if: ${{ runner.os == 'macOS' }}
        run: codesign --force --sign - target/$TARGET/release/gproxy$BIN_EXT

      - name: Prepare Linux Docker binary
        if: ${{ matrix.platform == 'linux' && (matrix.libc == 'gnu' || matrix.libc == 'musl') }}
        run: |
          mkdir -p docker-binary
          cp target/$TARGET/release/gproxy docker-binary/gproxy

      - name: Upload Linux Docker binary
        if: ${{ matrix.platform == 'linux' && (matrix.libc == 'gnu' || matrix.libc == 'musl') }}
        uses: actions/upload-artifact@v7
        with:
          name: docker-bin-${{ env.TARGET }}
          path: docker-binary/gproxy
          retention-days: 1

      # Repo has no LICENSE file yet, so the package only ships the
      # binary + README. Add LICENSE here once we pick one.
      - name: Package (unix)
        if: ${{ runner.os != 'Windows' }}
        run: |
          mkdir -p dist
          cp target/$TARGET/release/gproxy$BIN_EXT dist/gproxy$BIN_EXT
          cp README.md dist/
          (cd dist && zip -9 ../$ARTIFACT gproxy$BIN_EXT README.md)
          shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"

      - name: Package (windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = Join-Path -Path "target" -ChildPath "$env:TARGET/release/gproxy$env:BIN_EXT"
          $outBin = Join-Path -Path "dist" -ChildPath "gproxy$env:BIN_EXT"
          Copy-Item -Path $bin -Destination $outBin
          Copy-Item -Path README.md -Destination dist\
          Compress-Archive -Path $outBin,dist\README.md -DestinationPath $env:ARTIFACT -Force
          $hash = (Get-FileHash $env:ARTIFACT -Algorithm SHA256).Hash.ToLower()
          "${hash}  $env:ARTIFACT" | Out-File -Encoding ASCII "$env:ARTIFACT.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ env.TARGET }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
          retention-days: 1

      - name: Upload release assets
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.zip.sha256
          overwrite_files: true

  sign-release-assets:
    name: Sign release checksums
    if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-asset-*
          path: dist
          merge-multiple: true

      - name: Validate signing settings
        env:
          UPDATE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_B64 }}
          GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64: ${{ secrets.UPDATE_SIGNING_PUBLIC_KEY_B64 }}
        run: |
          set -euo pipefail
          test -n "${UPDATE_SIGNING_PRIVATE_KEY_B64}" || {
            echo "missing repo secret: UPDATE_SIGNING_PRIVATE_KEY_B64" >&2
            exit 1
          }
          test -n "${GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64}" || {
            echo "missing repo secret: GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64" >&2
            exit 1
          }

      - name: Sign checksum files
        env:
          UPDATE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_B64 }}
          GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64: ${{ secrets.UPDATE_SIGNING_PUBLIC_KEY_B64 }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p .signing
          printf '%s' "${UPDATE_SIGNING_PRIVATE_KEY_B64}" | base64 --decode > .signing/update-signing-private.pem
          chmod 600 .signing/update-signing-private.pem

          # Sanity check: derive the public Ed25519 key from the private
          # PEM and confirm it matches the configured public-key secret.
          # Catches mismatched key pairs before we ship signed checksums
          # the in-app updater can't verify.
          derived_public_key_b64="$(openssl pkey -in .signing/update-signing-private.pem -pubout -outform DER | tail -c 32 | base64 -w0)"
          if [ "${derived_public_key_b64}" != "${GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64}" ]; then
            echo "update signing public key mismatch between private and configured public key" >&2
            exit 1
          fi

          files=(dist/*.zip.sha256)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no checksum files found for signing" >&2
            exit 1
          fi

          for checksum in "${files[@]}"; do
            sig_bin="${checksum}.sig.bin"
            sig_txt="${checksum}.sig"
            openssl pkeyutl -sign -rawin \
              -inkey .signing/update-signing-private.pem \
              -in "$checksum" \
              -out "$sig_bin"
            base64 -w0 "$sig_bin" > "$sig_txt"
            printf '\n' >> "$sig_txt"
            rm -f "$sig_bin"
          done

          rm -f .signing/update-signing-private.pem

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signed-release-assets
          path: |
            dist/*.zip
            dist/*.zip.sha256
            dist/*.zip.sha256.sig
          retention-days: 1

  publish-release-assets:
    name: Publish release assets
    if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
    needs: sign-release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download signed artifacts
        uses: actions/download-artifact@v8
        with:
          name: signed-release-assets
          path: dist

      - name: Upload checksum signatures to release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip.sha256.sig
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Move staging tag to current commit
        if: ${{ github.event_name == 'push' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa staging -m "staging build ${GITHUB_SHA}" "${GITHUB_SHA}"
          git push origin refs/tags/staging --force

      - name: Publish staging release
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: staging
          name: staging
          body: |
            Automated staging build from `${{ github.sha }}`.
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.zip
            dist/*.zip.sha256
            dist/*.zip.sha256.sig
          fail_on_unmatched_files: true
          overwrite_files: true

  deploy-docs-cloudflare:
    name: Build and Deploy Docs (Cloudflare Pages)
    if: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) || github.event_name == 'release' }}
    runs-on: ubuntu-latest
    environment:
      name: cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build docs
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter docs build

      - name: Deploy docs to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_ID: ${{ secrets.CLOUDFLARE_PROJECT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "docs"
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_ID }}

  docker-build:
    name: Build Docker (${{ matrix.variant }}-${{ matrix.arch }})
    if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: gnu
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            runtime_base: gcr.io/distroless/cc-debian13
          - variant: gnu
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: ""
            runtime_base: gcr.io/distroless/cc-debian13
          - variant: musl
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: "-musl"
            runtime_base: gcr.io/distroless/static-debian13
          - variant: musl
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            suffix: "-musl"
            runtime_base: gcr.io/distroless/static-debian13
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: docker-bin-${{ matrix.target }}
          path: dist

      - name: Prepare runtime files
        run: |
          chmod +x dist/gproxy
          mkdir -p dist/data

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gproxy
          tags: |
            type=ref,event=tag,enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=staging,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=staging-,enable=${{ github.event_name == 'push' }}
          flavor: |
            suffix=-${{ matrix.arch }}${{ matrix.suffix }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.action
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            RUNTIME_BASE=${{ matrix.runtime_base }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=gproxy-docker-${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=gproxy-docker-${{ matrix.variant }}-${{ matrix.arch }}

  docker-manifest:
    name: Create Docker manifest
    if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gproxy
          tags: |
            type=ref,event=tag,enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=staging,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=staging-,enable=${{ github.event_name == 'push' }}

      - name: Create glibc manifest list
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker buildx imagetools create -t "$tag" \
                "${tag}-amd64" \
                "${tag}-arm64"
            fi
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Create musl manifest list
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker buildx imagetools create -t "${tag}-musl" \
                "${tag}-amd64-musl" \
                "${tag}-arm64-musl"
            fi
          done <<< "${{ steps.meta.outputs.tags }}"
