version: '3.8'

services:
  proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEYS=${OPENAI_API_KEYS:-}
      - OPENAI_KEY_ROTATION_STRATEGY=round-robin
      - RATE_LIMIT_REQUESTS_PER_MINUTE=60
      - CACHE_ENABLED=false
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

